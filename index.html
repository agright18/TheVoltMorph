<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive | High Fidelity</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="vignette"></div>
    <div id="scanlines"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-box">
                <small>SPEED</small>
                <h2 id="speed-display">0 KM/H</h2>
            </div>
            <div class="stat-box">
                <small>SCORE</small>
                <h2 id="score-display">0000</h2>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <div class="title-main">NEON OVERDRIVE</div>
        <button id="start-btn">INITIATE LAUNCH</button>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
