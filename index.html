<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Morph | Core Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e293b; font-family: 'Courier New', monospace; color: white; user-select: none; }
        
        /* The infinite grid background */
        #workspace {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(#475569 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* The SVG layer that holds the wires */
        #wire-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to components */
            z-index: 10;
        }
        
        .wire { stroke: #3b82f6; stroke-width: 4; fill: none; stroke-linecap: round; }
        .wire-temp { stroke: #ef4444; stroke-width: 4; stroke-dasharray: 5,5; fill: none; }

        /* Component Styles */
        .component {
            position: absolute;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 15px 20px;
            cursor: grab;
            z-index: 20;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }
        .component:active { cursor: grabbing; border-color: #3b82f6; }

        /* Pin Styles */
        .pin {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ef4444;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: crosshair;
            z-index: 30;
            transition: transform 0.1s;
        }
        .pin:hover { transform: scale(1.5); background: #22c55e; }
        
        /* Pin Positions */
        .pin-out { right: -8px; top: 50%; transform: translateY(-50%); }
        .pin-in { left: -8px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body>

    <div id="workspace">
        <svg id="wire-layer"></svg>

        <div class="component" id="comp1" style="left: 150px; top: 200px;">
            🔋 9V Battery
            <div class="pin pin-out" id="pin-bat-pos" data-comp="comp1"></div>
        </div>

        <div class="component" id="comp2" style="left: 500px; top: 250px;">
            <div class="pin pin-in" id="pin-led-anode" data-comp="comp2"></div>
            💡 LED
        </div>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        // This is where we store the actual "Graph" of the circuit
        let components = {
            'comp1': { el: document.getElementById('comp1'), x: 150, y: 200 },
            'comp2': { el: document.getElementById('comp2'), x: 500, y: 250 }
        };
        let wires = []; // Array to hold completed connections { fromPin, toPin }

        // Interaction State
        let draggedComp = null;
        let dragOffset = { x: 0, y: 0 };
        
        let drawingWire = false;
        let startPin = null;
        let tempWirePath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        tempWirePath.classList.add('wire-temp');

        const wireLayer = document.getElementById('wire-layer');
        const workspace = document.getElementById('workspace');

        // --- 1. DRAG COMPONENTS LOGIC ---
        document.querySelectorAll('.component').forEach(compEl => {
            compEl.addEventListener('mousedown', (e) => {
                // Ignore drag if we are clicking a pin
                if(e.target.classList.contains('pin')) return;
                
                draggedComp = compEl.id;
                const rect = compEl.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
            });
        });

        // --- 2. DRAW WIRE LOGIC ---
        document.querySelectorAll('.pin').forEach(pinEl => {
            pinEl.addEventListener('mousedown', (e) => {
                e.stopPropagation(); // Don't drag the component
                drawingWire = true;
                startPin = pinEl;
                wireLayer.appendChild(tempWirePath);
                updateTempWire(e.clientX, e.clientY);
            });

            pinEl.addEventListener('mouseup', (e) => {
                if (drawingWire && startPin && startPin.id !== pinEl.id) {
                    // Create a permanent connection!
                    wires.push({ from: startPin.id, to: pinEl.id });
                    renderWires();
                }
            });
        });

        // --- 3. GLOBAL MOUSE EVENTS ---
        document.addEventListener('mousemove', (e) => {
            // Move Component
            if (draggedComp) {
                const comp = components[draggedComp];
                comp.x = e.clientX - dragOffset.x;
                comp.y = e.clientY - dragOffset.y;
                comp.el.style.left = comp.x + 'px';
                comp.el.style.top = comp.y + 'px';
                renderWires(); // Redraw wires as it moves
            }

            // Draw Temporary Wire
            if (drawingWire) {
                updateTempWire(e.clientX, e.clientY);
            }
        });

        document.addEventListener('mouseup', () => {
            draggedComp = null;
            if (drawingWire) {
                drawingWire = false;
                startPin = null;
                if(tempWirePath.parentNode) wireLayer.removeChild(tempWirePath);
            }
        });

        // --- 4. RENDER ENGINE ---
        
        // Get exact center of a pin element
        function getPinCoords(pinId) {
            const pin = document.getElementById(pinId);
            const rect = pin.getBoundingClientRect();
            return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
        }

        // Draw a smooth curved line between two points
        function generateBezierPath(x1, y1, x2, y2) {
            const distance = Math.abs(x1 - x2) * 0.5; // Curvature strength
            return `M ${x1} ${y1} C ${x1 + distance} ${y1}, ${x2 - distance} ${y2}, ${x2} ${y2}`;
        }

        function updateTempWire(mouseX, mouseY) {
            if (!startPin) return;
            const start = getPinCoords(startPin.id);
            tempWirePath.setAttribute('d', generateBezierPath(start.x, start.y, mouseX, mouseY));
        }

        function renderWires() {
            // Clear existing permanent wires
            document.querySelectorAll('.wire').forEach(w => w.remove());

            wires.forEach(wire => {
                const start = getPinCoords(wire.from);
                const end = getPinCoords(wire.to);
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.classList.add('wire');
                path.setAttribute('d', generateBezierPath(start.x, start.y, end.x, end.y));
                wireLayer.appendChild(path);
            });
        }

        // Initial render
        renderWires();
    </script>
</body>
</html>
